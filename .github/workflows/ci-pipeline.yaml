name: CI

on:
  push:
    branches: ["**"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python3 -m pip install uv

      - name: Install project dependencies with uv
        run: uv sync

      - name: Install tooling (ruff, pytest, pytest-bdd)
        run: |
          python3 -m pip install ruff pytest pytest-bdd

      - name: Ruff linter (check errors)
        run: python3 -m ruff check . --fix

      - name: Ruff formatter (check format)
        run: python3 -m ruff format . --check

      - name: Unit tests
        run: python3 -m pytest ./core/tests/unit

      - name: Integration tests
        run: python3 -m pytest ./core/tests/integration

      - name: BDD tests
        run: python3 -m pytest ./core/tests/behaviour
